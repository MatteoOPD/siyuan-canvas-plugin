services:
  canvas-installer:
    image: alpine:3.20
    environment:
      PLUGIN_URL: https://github.com/MatteoOPD/siyuan-canvas-plugin/releases/download/v0.3.1/package.zip
    volumes:
      - siyuan_data:/workspace
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        apk add --no-cache curl unzip
        mkdir -p /workspace/data/plugins/siyuan-canvas
        curl -fsSL "$${PLUGIN_URL}" -o /tmp/siyuan-canvas.zip
        unzip -oq /tmp/siyuan-canvas.zip -d /workspace/data/plugins/siyuan-canvas
        chown -R 1000:1000 /workspace/data/plugins/siyuan-canvas
        echo "SiYuan Canvas wurde erfolgreich installiert."
    restart: "no"

volumes:
  siyuan_data:
    external: true
    name: prod_siyuan_siyuan_data
